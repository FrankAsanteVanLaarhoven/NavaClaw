version: '3.8'

services:
  # NAVACLAW-AI Core (Next.js standalone)
  navaclaw-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: navaclaw-web
    environment:
      - NODE_ENV=production
      - PORT=8080
      - NEXT_PUBLIC_APP_URL=https://navaclaw.com
      - NEXT_PUBLIC_API_URL=https://navaclaw.com/api
    env_file:
      - .env.production
    networks:
      - navaclaw-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: navaclaw-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    networks:
      - navaclaw-network
    restart: unless-stopped
    depends_on:
      - navaclaw-web

networks:
  navaclaw-network:
    driver: bridge
