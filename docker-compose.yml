version: '3.8'

services:
  # NAVACLAW-AI Core (Next.js standalone)
  navaclaw-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: navaclaw-web
    expose:
      - "8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      - NEXT_PUBLIC_APP_URL=https://navaclaw.com
      - NEXT_PUBLIC_API_URL=https://navaclaw.com/api
    env_file:
      - .env.production
    networks:
      - public-proxy
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  public-proxy:
    external: true
